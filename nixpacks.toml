[phases.setup]
nixPkgs = ["nodejs_22", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "cd frontend && npm install",
  "python3 -m venv /opt/venv && . /opt/venv/bin/activate && pip install -r backend/requirements.txt"
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "cd /app/backend && /opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
